name: Release Windows app

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Windows installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --bundles nsis
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: skills-list v__VERSION__
          releaseBody: Windows installer for skills-list.
          releaseDraft: false
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: skills-list-[version]-[platform]-[arch][setup][ext]
